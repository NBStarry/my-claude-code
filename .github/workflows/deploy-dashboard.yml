name: Deploy Dashboard

on:
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: which jq || sudo apt-get install -y jq

      - name: Generate site data (fallback if not pre-generated locally)
        run: |
          if [ -f site/data.json ]; then
            echo "Using pre-generated data.json (from local sync-configs.sh push)"
          else
            echo "No pre-generated data.json, generating from repo only"
            bash scripts/generate-site-data.sh
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
